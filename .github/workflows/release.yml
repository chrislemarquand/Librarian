name: macOS Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: macos-26
    env:
      DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
      DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
      NOTARY_PROFILE: LIBRARIAN_NOTARY
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve package dependencies
        run: xcodebuild -resolvePackageDependencies -project Librarian.xcodeproj -scheme Librarian

      - name: Locate Sparkle generate_appcast
        run: |
          SPARKLE_GENERATE_APPCAST="$(find ~/Library/Developer/Xcode/DerivedData -type f -path '*SourcePackages/checkouts/Sparkle/bin/generate_appcast' | head -n 1)"
          if [[ -z "$SPARKLE_GENERATE_APPCAST" ]]; then
            echo "Could not locate Sparkle generate_appcast after package resolution" >&2
            exit 1
          fi
          echo "SPARKLE_GENERATE_APPCAST=$SPARKLE_GENERATE_APPCAST" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Configure notarytool profile
        run: |
          xcrun notarytool store-credentials "$NOTARY_PROFILE" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: Build, notarize, package, and generate appcast
        env:
          GENERATE_APPCAST: "1"
        run: ./scripts/release/release.sh

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: librarian-release-artifacts
          path: |
            build/archive/Librarian.zip
            build/dmg/Librarian.dmg
            build/appcast/appcast.xml

      - name: Upload appcast for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/appcast

  publish_appcast:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
